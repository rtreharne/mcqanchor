services:
  - type: web
    name: mcq-anchor
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    domains:
      - mcqanchor.com
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,.mcqanchor.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://mcqanchor.com,https://www.mcqanchor.com"
      - key: SQLITE_PATH
        value: /app/data/db.sqlite3
      - key: MEDIA_ROOT
        value: /app/data/media
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DJANGO_ADMIN_USERNAME
        sync: false
      - key: DJANGO_ADMIN_PASSWORD
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@mcqanchor.local
