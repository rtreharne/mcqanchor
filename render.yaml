services:
  - type: web
    name: mcq-anchor
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    domains:
      - mcqanchor.com
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,.mcqanchor.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://mcqanchor.com,https://www.mcqanchor.com"
      - key: SQLITE_PATH
        value: /app/data/db.sqlite3
      - key: CONTACT_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
